name: Watch Patches Releases
on:
  schedule:
    # Vérifie toutes les heures si de nouvelles releases sont disponibles
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check patches releases and trigger build once
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const sources = [
              { owner: 'ReVanced', repo: 'revanced-patches', tagFile: '.last-revanced-tag', label: 'ReVanced' },
              { owner: 'anddea', repo: 'revanced-patches', tagFile: '.last-anddea-tag', label: 'anddea' },
              { owner: 'MorpheApp', repo: 'morphe-patches', tagFile: '.last-morphe-tag', label: 'MorpheApp' },
            ];

            let needsBuild = false;

            for (const src of sources) {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: src.owner,
                repo: src.repo,
                per_page: 1,
              });

              if (releases.length === 0) continue;

              const releaseTag = releases[0].tag_name;
              const lastCheckedFile = path.join(process.cwd(), src.tagFile);
              let lastCheckedTag = '';
              try {
                if (fs.existsSync(lastCheckedFile)) {
                  lastCheckedTag = fs.readFileSync(lastCheckedFile, 'utf8').trim();
                }
              } catch (e) {
                console.log(`Fichier ${src.tagFile} non trouvé, première exécution`);
              }

              if (releaseTag !== lastCheckedTag) {
                console.log(`Nouvelle release ${src.label} détectée: ${releaseTag} (ancienne: ${lastCheckedTag || 'aucune'})`);
                fs.writeFileSync(lastCheckedFile, releaseTag);
                needsBuild = true;
              } else {
                console.log(`Pas de nouvelle release ${src.label}. Dernière: ${releaseTag}`);
              }
            }

            if (needsBuild) {
              const { data: repo } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build.yml',
                ref: repo.default_branch || 'main',
              });
              console.log('Un seul dispatch vers build.yml (au moins une source a changé).');
            } else {
              console.log('Aucun changement de release, pas de build déclenché.');
            }

      - name: Commit last checked tags
        if: always()
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .last-*-tag || true
          if git diff --staged --quiet; then
            echo "Aucun changement à committer"
          else
            git commit -m "Update last checked release tags" || exit 0
            git push || exit 0
          fi
